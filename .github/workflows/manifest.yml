name: Update photo manifest
on:
  push:
    paths:
      - 'photos/**'

jobs:
  manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - run: pip install Pillow -q

      - name: Generate thumbnails and manifest
        run: |
          python3 - <<'EOF'
          import json, os
          from PIL import Image

          exts = ('.jpg', '.jpeg', '.png', '.webp', '.gif', '.avif')
          os.makedirs('photos/thumbs', exist_ok=True)

          photos = sorted(f for f in os.listdir('photos') if f.lower().endswith(exts))

          for name in photos:
            thumb = f'photos/thumbs/{name}'
            if not os.path.exists(thumb):
              img = Image.open(f'photos/{name}')
              img.thumbnail((1200, 1200))
              img.save(thumb, quality=85, optimize=True)
              print(f'thumbnail: {name}')

          with open('photos.json', 'w') as f:
            json.dump(photos, f, indent=2)

          print(f'photos.json updated — {len(photos)} photo(s)')
          EOF

      - name: Commit
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add photos/thumbs/ photos.json
          git diff --staged --quiet || git commit -m 'chore: update thumbnails and manifest'
          git push
